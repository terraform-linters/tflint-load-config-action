name: 'build-test'
on: # rebuild any PRs and main branch changes
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'
permissions: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: node-version
        uses: bendrucker/github-action-node-version@d01200017abb7fdcc58f7c0ec79db459c5018aec # v1.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: npm
      - run: npm ci
      - run: npm run all
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: load-config
        uses: ./
        with:
          source-repo: ${{ github.repository }}
          source-path: fixtures/.tflint.hcl
          source-ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: diff <(cat "${{ steps.load-config.outputs.path }}") fixtures/.tflint.hcl
